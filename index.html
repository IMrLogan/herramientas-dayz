<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DayZ Spawn Gear Presets V8 (Engine Fix)</title>
    <style>
        :root {
            --bg-dark: #121212; --bg-panel: #1e1e1e; --bg-slot: #2b2b2b;
            --primary: #4caf50; --primary-hover: #45a049; --secondary: #2196F3;
            --warning: #ff9800; --danger: #f44336;
            --text-light: #ffffff; --text-muted: #aaaaaa; --border: #333333;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-dark); color: var(--text-light); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background-color: var(--bg-panel); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10; flex-wrap: wrap; gap: 10px; }
        header h1 { margin: 0; font-size: 20px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        
        .nav-bar { background-color: var(--bg-panel); padding: 10px 15px; border-bottom: 1px solid var(--border); text-align: center; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .nav-bar a { color: var(--text-muted); text-decoration: none; font-weight: bold; font-size: 14px; padding: 5px 10px; border-radius: 4px; transition: 0.3s; }
        .nav-bar a:hover, .nav-bar a.active { color: var(--primary); background: rgba(76, 175, 80, 0.1); }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        button, .file-upload-label { background-color: var(--primary); color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 13px; transition: background 0.3s; }
        
        main { display: flex; flex: 1; padding: 15px; gap: 15px; overflow-x: hidden; }
        .column { background-color: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; flex: 1; min-width: 300px; }
        
        /* RESPONSIVIDAD PARA CELULARES */
        @media (max-width: 1024px) {
            main { flex-direction: column; overflow-y: visible; }
            body { height: auto; }
            .column { min-width: 100%; box-sizing: border-box; }
            header { flex-direction: column; text-align: center; }
        }

        h2 { font-size: 16px; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; color: var(--primary); text-transform: uppercase; }

        .survivor-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; font-size: 13px;}
        .survivor-list label { display: flex; align-items: center; gap: 8px; cursor: pointer; background: var(--bg-dark); padding: 5px; border-radius: 4px; }

        .equip-card { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; padding: 8px;}
        .slot-group { display: flex; align-items: center; gap: 10px; }
        .slot-label { width: 70px; font-size: 11px; color: var(--text-muted); font-weight: bold; text-transform: uppercase;}
        .item-thumb { width: 40px; height: 40px; background-color: #222; border-radius: 4px; object-fit: contain; border: 1px solid #444;}
        
        .slot-input-wrapper { flex: 1; }
        .slot-input-wrapper input, select { width: 100%; padding: 10px; background-color: var(--bg-slot); border: 1px solid var(--border); color: white; border-radius: 4px; box-sizing: border-box; }

        .cargo-item { background-color: var(--bg-slot); padding: 10px; margin-bottom: 10px; border-radius: 4px; border-left: 3px solid var(--primary); }
        
        #json-preview { background-color: var(--bg-dark); padding: 15px; border-radius: 5px; border: 1px solid var(--border); color: #a6e22e; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
        
        .db-status { font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>

    <datalist id="all-items"></datalist>

    <header>
        <div>
            <h1>Spawn Gear V8 <span style="font-size: 10px; color: var(--text-muted);">Mobile OK</span></h1>
            <div id="db-indicator" class="db-status">Base de datos: <span style="color:var(--warning)">Cargando...</span></div>
        </div>
        <div class="controls">
            <label class="file-upload-label" id="manual-upload-btn" style="display: none;">
                XML Manual <input type="file" id="file-input" accept=".xml">
            </label>
            <button id="export-btn">Descargar .JSON</button>
        </div>
    </header>

    <div class="nav-bar">
        <a href="index.html" class="active">🛠️ Creador Loadouts</a>
        <a href="spawn.html">🚗 Spawns Autos</a>
    </div>

    <main>
        <div class="column">
            <h2>Sobrevivientes</h2>
            <div style="margin-bottom:10px;">
                <button onclick="toggleAllSurvivors(true)" style="padding:5px 10px;">Todos</button>
                <button onclick="toggleAllSurvivors(false)" style="padding:5px 10px; background:#444;">Ninguno</button>
            </div>
            <div id="survivor-container" class="survivor-list"></div>
        </div>

        <div class="column">
            <h2>Equipamiento Principal</h2>
            <div id="equip-form"></div>
        </div>

        <div class="column">
            <h2>Inventario y Manos</h2>
            <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:15px;">
                <input type="text" id="new-cargo-item" list="all-items" placeholder="Nombre del ítem..." style="padding:10px; background:var(--bg-slot); color:white; border:1px solid var(--border); border-radius:4px;">
                <select id="new-cargo-dest" style="padding:10px; background:var(--bg-slot); color:white; border:1px solid var(--border); border-radius:4px;">
                    <option value="cargo">A Inventario</option>
                    <option value="Hands">A las Manos</option>
                    <option value="shoulderL">Hombro Izquierdo</option>
                    <option value="shoulderR">Hombro Derecho</option>
                </select>
                <button id="add-cargo-btn">+ Añadir Ítem</button>
            </div>
            <ul id="cargo-list" style="list-style:none; padding:0;"></ul>
        </div>

        <div class="column">
            <h2>Vista Previa JSON</h2>
            <pre id="json-preview"></pre>
        </div>
    </main>

    <script>
        // Configuración de rutas e imágenes
        const imgBase = "images/";
        function getImgUrl(name) { return name ? `${imgBase}${name}.png` : 'https://placehold.co/40x40/2b2b2b/4caf50?text=?'; }
        function getFallback(name) { return `https://placehold.co/40x40/222/555?text=${name ? name[0].toUpperCase() : '?'}`; }

        let itemsDB = [];

        function processXML(xmlString) {
            const parser = new DOMParser();
            const types = parser.parseFromString(xmlString, "application/xml").getElementsByTagName('type');
            const datalist = document.getElementById('all-items');
            datalist.innerHTML = '';
            itemsDB = [];
            const fragment = document.createDocumentFragment();

            for (let i = 0; i < types.length; i++) {
                const name = types[i].getAttribute('name');
                if(name) {
                    itemsDB.push(name);
                    const opt = document.createElement('option');
                    opt.value = name;
                    fragment.appendChild(opt);
                }
            }
            datalist.appendChild(fragment);
            document.getElementById('db-indicator').innerHTML = `Base de datos: <span style="color:var(--primary)">Lista (Universal)</span>`;
            document.getElementById('manual-upload-btn').style.display = 'none';
        }

        // Carga Automática
        fetch('types.xml').then(r => r.text()).then(processXML).catch(() => {
            document.getElementById('db-indicator').innerHTML = `Base de datos: <span style="color:var(--danger)">Carga Manual</span>`;
            document.getElementById('manual-upload-btn').style.display = 'inline-block';
        });

        document.getElementById('file-input').addEventListener('change', e => {
            const r = new FileReader();
            r.onload = () => processXML(r.result);
            r.readAsText(e.target.files[0]);
        });

        // Lógica de Sobrevivientes
        const chars = ["SurvivorM_Mirek", "SurvivorM_Denis", "SurvivorM_Boris", "SurvivorM_Cyril", "SurvivorM_Elias", "SurvivorM_Francis", "SurvivorM_Guo", "SurvivorM_Hassan", "SurvivorM_Indar", "SurvivorM_Jose", "SurvivorM_Kaito", "SurvivorM_Lewis", "SurvivorM_Manua", "SurvivorM_Niki", "SurvivorM_Oliver", "SurvivorM_Peter", "SurvivorM_Quinn", "SurvivorM_Rolf", "SurvivorM_Seth", "SurvivorM_Taiki", "SurvivorF_Linda", "SurvivorF_Maria", "SurvivorF_Frida", "SurvivorF_Gabi", "SurvivorF_Helga", "SurvivorF_Irena", "SurvivorF_Judy", "SurvivorF_Keiko", "SurvivorF_Eva", "SurvivorF_Naomi", "SurvivorF_Baty"];
        const survCont = document.getElementById('survivor-container');
        chars.forEach(c => {
            const l = document.createElement('label');
            l.innerHTML = `<input type="checkbox" class="surv-cb" value="${c}" checked onchange="updateJson()"> ${c.replace('Survivor', '')}`;
            survCont.appendChild(l);
        });
        window.toggleAllSurvivors = s => { document.querySelectorAll('.surv-cb').forEach(cb => cb.checked = s); updateJson(); };

        // Slots de Equipamiento
        const equipSlots = [
            { id: 'Headgear', label: 'Cabeza', def: 'BaseballCap_Black' },
            { id: 'Mask', label: 'Máscara', def: '' },
            { id: 'Eyewear', label: 'Gafas', def: '' },
            { id: 'Body', label: 'Torso', def: 'TShirt_Black' },
            { id: 'Vest', label: 'Chaleco', def: '' },
            { id: 'Back', label: 'Mochila', def: 'DryBag_Black' },
            { id: 'Hips', label: 'Cinturón', def: '' },
            { id: 'Armband', label: 'Brazalete', def: 'Armband_Blue' },
            { id: 'Gloves', label: 'Guantes', def: '' },
            { id: 'Legs', label: 'Piernas', def: 'CargoPants_Black' },
            { id: 'Feet', label: 'Pies', def: 'JoggingShoes_Black' }
        ];

        let equipAtts = {};
        equipSlots.forEach(s => equipAtts[s.id] = []);
        const equipForm = document.getElementById('equip-form');

        function renderEquip() {
            equipForm.innerHTML = '';
            equipSlots.forEach(s => {
                const card = document.createElement('div');
                card.className = 'equip-card';
                card.innerHTML = `
                    <div class="slot-group">
                        <div class="slot-label">${s.label}</div>
                        <img id="img-${s.id}" class="item-thumb" src="${getImgUrl(s.def)}" onerror="this.src='${getFallback(s.def)}'">
                        <div class="slot-input-wrapper">
                            <input type="text" id="${s.id}" value="${s.def}" list="all-items" oninput="handleIn('${s.id}')">
                        </div>
                    </div>
                `;
                equipForm.appendChild(card);
            });
            updateJson();
        }

        window.handleIn = id => {
            const v = document.getElementById(id).value;
            equipSlots.find(s => s.id === id).def = v;
            const img = document.getElementById(`img-${id}`);
            img.src = getImgUrl(v);
            updateJson();
        };

        // Cargo
        let cargoItems = [{ name: "Glock19", destination: "Hands" }];
        function renderCargo() {
            const list = document.getElementById('cargo-list');
            list.innerHTML = '';
            cargoItems.forEach((it, i) => {
                const li = document.createElement('li');
                li.className = 'cargo-item';
                li.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${getImgUrl(it.name)}" class="item-thumb" onerror="this.src='${getFallback(it.name)}'">
                        <div style="flex:1;"><b>${it.name}</b><br><small>${it.destination}</small></div>
                        <button onclick="remCargo(${i})" style="background:var(--danger); padding:5px 8px;">X</button>
                    </div>
                `;
                list.appendChild(li);
            });
            updateJson();
        }

        document.getElementById('add-cargo-btn').onclick = () => {
            const n = document.getElementById('new-cargo-item').value;
            const d = document.getElementById('new-cargo-dest').value;
            if(n) { cargoItems.push({name:n, destination:d}); renderCargo(); }
        };
        window.remCargo = i => { cargoItems.splice(i,1); renderCargo(); };

        // Exportación JSON
        function updateJson() {
            const res = {
                "spawnWeight": 1,
                "name": "DZB_Loadout_All",
                "characterTypes": [...document.querySelectorAll('.surv-cb:checked')].map(cb => cb.value),
                "attachmentSlotItemSets": [],
                "discreteUnsortedItemSets": []
            };

            equipSlots.forEach(s => {
                if(s.def) res.attachmentSlotItemSets.push({ "slotName": s.id, "discreteItemSets": [{"itemType": s.def, "spawnWeight": 1, "attributes": {"healthMin": 1.0, "healthMax": 1.0, "quantityMin": 1.0, "quantityMax": 1.0}}]});
            });

            const cargo = cargoItems.filter(c => c.destination === 'cargo').map(c => c.name);
            if(cargo.length) res.discreteUnsortedItemSets.push({"name": "Cargo", "spawnWeight": 1, "attributes": {"healthMin": 1.0, "healthMax": 1.0, "quantityMin": 1.0, "quantityMax": 1.0}, "simpleChildrenTypes": cargo});

            cargoItems.filter(c => c.destination !== 'cargo').forEach(c => {
                res.attachmentSlotItemSets.push({ "slotName": c.destination, "discreteItemSets": [{"itemType": c.name, "spawnWeight": 1, "attributes": {"healthMin": 1.0, "healthMax": 1.0, "quantityMin": 1.0, "quantityMax": 1.0}}]});
            });

            document.getElementById('json-preview').textContent = JSON.stringify(res, null, 4);
        }

        document.getElementById('export-btn').onclick = () => {
            const blob = new Blob([document.getElementById('json-preview').textContent], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "spawnGearPresets.json";
            a.click();
        };

        renderEquip();
        renderCargo();
    </script>
</body>
</html>
